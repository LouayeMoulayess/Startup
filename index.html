<html lang="en">
<head>

<meta name="theme-color" content="#F5F5F7">
<meta name="description" content="A fast, beautifully designed personal dashboard and start page.">
<title>Salut!</title>

<style>
:root {
  --bg: #F5F5F7;
  --yellow: #FF9500; /* Vibrant, modern amber */
  --text: #1C1C1E; /* Softer, richer black */
  --muted: #8E8E93; /* Crisp, legible gray */
  --card: rgba(255, 255, 255, 0.85); /* Slightly more opaque for better contrast */
  --border: rgba(0, 0, 0, 0.06);
  --font-main: 'Plus Jakarta Sans', sans-serif;
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow-sm: 0 8px 32px rgba(0,0,0,0.04);
}

/* ── DARK MODE ── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0A0A0A; /* Deep zinc to reduce eye strain (halation) */
    --text: #F5F5F7; /* Off-white for smooth reading */
    --muted: #A1A1A6; /* Brighter gray so it doesn't get lost in the dark */
    --card: rgba(28, 28, 30, 0.7); /* Solidified glass backing */
    --border: rgba(255, 255, 255, 0.1);
    --shadow-sm: 0 8px 32px rgba(0,0,0,0.2);
  }
}

*, *::before, *::after { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}

/* ── ANIMATIONS ── */
@keyframes fadeUp { 
  from { opacity: 0; transform: translateY(12px); } 
  to { opacity: 1; transform: translateY(0); } 
}
@keyframes digitOut { 
  from { opacity: 1; transform: translateY(0); } 
  to { opacity: 0; transform: translateY(-14px); } 
}
@keyframes digitIn { 
  from { opacity: 0; transform: translateY(14px); } 
  to { opacity: 1; transform: translateY(0); } 
}
@keyframes pulse { 
  50% { opacity: 0.5; } 
}

.digit-changing { animation: digitOut 0.15s ease forwards; }
.digit-incoming { animation: digitIn  0.15s ease forwards; }

body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 24px 20px; 
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── UTILITIES ── */
.flex-center { display: flex; align-items: center; }
.flex-center-gap { display: flex; align-items: center; gap: 8px; }
.color-picker { width: 48px; padding: 2px; height: 36px; cursor: pointer; }
.mb-8 { margin-bottom: 8px; }

/* ── GLASS PANEL COMPONENT ── */
.glass-panel {
  background: var(--card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

/* ── SKELETON LOADERS ── */
.skeleton {
  animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  border-radius: 4px;
  color: transparent !important;
  background: var(--border);
  user-select: none;
  pointer-events: none;
}
.skeleton-block { width: 100%; height: 100%; min-height: 100px; border-radius: var(--radius-sm); }

/* ── SETTINGS BTN ── */
.settings-btn {
  position: absolute;
  top: 24px;
  right: 28px;
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.settings-btn:hover { background: var(--border); color: var(--text); }
.settings-btn svg { width: 20px; height: 20px; }

header { 
  width: 100%; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  padding-top: 10px; 
}

#clock {
  font-family: var(--font-main);
  font-weight: 800;
  font-size: clamp(64px, 11vw, 88px); 
  letter-spacing: -4px;
  line-height: 0.85; 
  display: flex;
  align-items: flex-end;
}

.digit-wrap { display: inline-block; overflow: hidden; }
.colon { margin: 0 1px 0.04em; color: var(--yellow); opacity: 0.5; vertical-align: 0.15em; }
#ampm { font-size: 0.25em; font-weight: 800; letter-spacing: 2px; color: var(--yellow); margin-left: 10px; opacity: 0.6; }

.sub-header {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 12px;
  animation: fadeUp 0.3s 0.1s ease both;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.sub-header-dot {
  opacity: 0.3;
  font-size: 10px;
}

#date { font-weight: 500; }

#lebanon { font-weight: 500; }
#lebanon span { color: #FF3B30; font-weight: 700; margin-left: 4px; }

.divider {
  width: 100%;
  max-width: 1152px;
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.main-layout {
  display: flex;
  gap: 24px;
  width: 100%;
  max-width: 1152px;
  margin: 0 auto;
  align-items: stretch; 
}

/* 3-Column Grid setup */
.left-panel { display: flex; flex-direction: column; gap: 24px; flex: 0 0 280px; }
.container { flex: 1; display: flex; flex-direction: column; gap: 24px; min-width: 0; }
.side-panel { display: flex; flex-direction: column; gap: 24px; flex: 0 0 280px; }
.omnibar-wrapper { display: flex; flex-direction: column; gap: 16px; width: 100%; }
form#search-form { width: 100%; }

#omnibar {
  width: 100%;
  padding: 22px 28px;
  border-radius: var(--radius-lg);
  font-family: var(--font-main);
  font-weight: 800;
  font-size: 20px;
  color: var(--text);
  outline: none;
  transition: all 0.3s ease;
  animation: fadeUp 0.4s 0.15s ease both;
}

#omnibar:focus { 
  border-color: var(--yellow); 
  box-shadow: 0 0 0 4px rgba(255, 149, 0, 0.15);
  background: var(--bg);
}
#omnibar::placeholder { opacity: 0.3; font-style: italic; font-size: 14px; font-weight: 500; }

/* General Widget Styles */
.widget-card {
  border-radius: var(--radius-md);
  animation: fadeUp 0.4s 0.2s ease both;
  overflow: hidden;
}
.widget-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-shrink: 0;
}
.widget-title {
  font-family: var(--font-main);
  font-weight: 700;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* ── WEATHER PANEL ── */
.weather-widget {
  width: 100%;
  max-width: 1152px;
  margin: 24px auto 0;
  border-radius: var(--radius-lg);
  padding: 24px 32px;
  display: flex;
  gap: 32px;
  animation: fadeUp 0.4s 0.3s ease both;
}
.weather-panel { display: flex; flex-direction: column; }
.wp-current { flex: 0 0 260px; }
.wp-hourly { flex: 1; border-left: 1px solid var(--border); border-right: 1px solid var(--border); padding: 0 32px; }
.wp-daily { flex: 0 0 220px; }

.weather-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.weather-title { font-family: var(--font-main); font-weight: 800; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.weather-city { font-family: var(--font-main); font-weight: 800; font-size: 16px; color: var(--text); }
.location-fallback { color: var(--yellow); display: inline-flex; align-items: center; gap: 4px; }
.location-fallback svg { width: 14px; height: 14px; }

.weather-main { display: flex; align-items: center; gap: 16px; margin-top: 12px; margin-bottom: 8px; }
.weather-icon-large { font-size: 48px; line-height: 1; cursor: pointer; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.weather-icon-large:hover { transform: scale(1.15) rotate(5deg); }
.weather-icon-large:active { transform: scale(0.95); }
.weather-temp { font-size: 36px; font-weight: 800; line-height: 1; }
.weather-desc { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: capitalize; margin-top: 4px; }
.weather-extra { font-size: 12px; font-weight: 500; color: var(--muted); margin-top: 4px; }

.forecast-strip { display: flex; justify-content: space-between; align-items: center; height: 100%; }
.forecast-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.f-time { font-size: 11px; font-weight: 700; color: var(--muted); }
.f-icon { font-size: 20px; }
.f-temp { font-size: 13px; font-weight: 800; }

.daily-forecast-container { display: flex; flex-direction: column; justify-content: space-around; height: 100%; }
.daily-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; }
.d-day { width: 50px; color: var(--text); }
.d-icon { font-size: 16px; text-align: center; flex: 1; }
.d-temp { width: 70px; text-align: right; color: var(--muted); font-size: 12px; }
.d-temp-max { color: var(--text); font-size: 13px; margin-left: 6px; font-weight: 700; }

@media (max-width: 1150px) {
  .weather-widget { flex-direction: column; padding: 24px; }
  .wp-hourly { border: none; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 24px 0; margin: 0; min-height: 120px; }
}

/* Calculator Specifics */
#calc-widget { height: 400px; padding: 16px; flex: none; }

/* TradingView */
.voo-widget { height: 400px; padding: 12px 16px 16px 16px; display: flex; flex-direction: column; }
#tv-widget-container { flex: 1; width: 100%; }
.tradingview-widget-container { flex: 1; width: 100%; height: 100%; }

.market-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 8px;
}
.market-status::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
.market-status.open { color: #2e7d32; background: rgba(46, 125, 50, 0.1); }
.market-status.open::before { background: #2e7d32; }
.market-status.closed { color: #db2416; background: rgba(219, 36, 22, 0.1); }
.market-status.closed::before { background: #db2416; }
@media (prefers-color-scheme: dark) {
  .market-status.open { color: #4caf50; background: rgba(76, 175, 80, 0.15); }
  .market-status.open::before { background: #4caf50; }
  .market-status.closed { color: #ef5350; background: rgba(239, 83, 80, 0.15); }
  .market-status.closed::before { background: #ef5350; }
}

/* Calculator */
.calculator-widget { display: flex; flex-direction: column; gap: 12px; flex: none; }
.calc-display {
  font-family: var(--font-main);
  font-weight: 700;
  font-size: 36px;
  text-align: right;
  color: var(--text);
  padding: 4px 8px 12px;
  background: transparent;
  border: none;
  overflow-x: auto;
  white-space: nowrap;
}
.calc-display::-webkit-scrollbar { display: none; }
.calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); gap: 8px; flex: 1; }
.calc-btn {
  background: rgba(0,0,0,0.03);
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-main);
  font-weight: 600;
  font-size: 16px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
@media (prefers-color-scheme: dark) { .calc-btn { background: rgba(255,255,255,0.04); } }

.calc-btn svg { width: 16px; height: 16px; opacity: 0.7; }
.calc-btn:hover { background: var(--border); transform: translateY(-1px); }
.calc-btn:active { transform: scale(0.96); }
.calc-btn.span-2 { grid-column: span 2; }
.calc-btn.btn-op { color: var(--yellow); font-size: 18px; font-weight: 700; }
.calc-btn.btn-eq { background: var(--yellow); color: #fff; font-weight: 700; }
.calc-btn.btn-eq:hover { opacity: 0.9; }
.calc-btn.btn-clear { color: var(--muted); }

/* Scratchpad */
.scratchpad-container {
  border-radius: var(--radius-md);
  animation: fadeUp 0.4s 0.25s ease both;
  display: flex;
  flex-direction: column;
  height: 306px; /* Precisely aligns bottom with adjacent 400px widgets */
  flex: none; 
}
.scratchpad-header {
  display: flex;
  justify-content: flex-end; 
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.scratchpad-actions { display: flex; align-items: center; gap: 12px; }
.save-indicator { 
  font-size: 10px; 
  font-family: var(--font-main);
  font-weight: 700; 
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  opacity: 0; 
  transition: opacity 0.3s; 
  pointer-events: none; 
}
.save-indicator.visible { opacity: 0.7; }

.action-btn { 
  cursor: pointer; 
  opacity: 0.7; 
  transition: opacity 0.2s; 
  display: flex; 
  align-items: center; 
  background: none; 
  border: none; 
  padding: 0; 
  color: var(--muted); 
} 
.action-btn:hover { opacity: 1; color: var(--text); }
.action-btn svg { width: 15px; height: 15px; }

#scratchpad-input {
  flex: 1;
  border: none;
  resize: none;
  padding: 20px;
  background: transparent;
  color: var(--text);
  font-family: var(--font-main);
  font-size: 15px;
  line-height: 1.6;
  outline: none;
}
#scratchpad-input::placeholder { opacity: 0.3; font-weight: 400; }
#scratchpad-input::-webkit-scrollbar { display: none; } /* Hide scrollbar for clean look */

/* ── QUOTE SECTION ── */
.quote-container {
  width: 100%;
  max-width: 1152px;
  margin: 12px auto 8px;
  text-align: center;
  animation: fadeUp 0.4s 0.15s ease both;
}
#quote-text { font-size: 14px; font-style: italic; font-weight: 400; color: #34C759; display: inline; }
#quote-author { font-family: var(--font-main); font-weight: 500; font-size: 13px; color: var(--muted); display: inline; opacity: 0.7; margin-left: 6px; }

/* ── SETTINGS MODAL ── */
.modal-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  opacity: 1; transition: opacity 0.2s;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { opacity: 0; pointer-events: none; }
.modal-content {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
  width: 90%;
  max-width: 480px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.modal-content h2 { margin-bottom: 20px; font-weight: 800; font-size: 18px; color: var(--text); }
.form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
.form-group label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group textarea {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-main);
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--yellow); }
.form-group textarea { resize: vertical; font-size: 13px; font-family: monospace; white-space: pre; overflow-x: auto; line-height: 1.4; }
.modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
.btn {
  padding: 10px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: var(--font-main);
}
.btn:hover { background: var(--bg); border-color: var(--muted); }
.btn.primary { background: var(--yellow); border-color: var(--yellow); color: #fff; }
.btn.primary:hover { opacity: 0.9; }

@media (max-width: 1150px) {
  .main-layout { flex-direction: column; align-items: center; }
  .left-panel, .container, .side-panel, .divider { max-width: 560px; width: 100%; flex: none; }
  .scratchpad-container { height: 320px; flex: none; }
}
</style>
</head>

<button id="settings-open-btn" class="settings-btn" title="Settings" aria-label="Settings">
  <svg><use href="#icon-settings"></use></svg>
</button>

<header>
  <div id="clock">
    <span class="digit-wrap"><span id="h">00</span></span><span class="colon">:</span><span class="digit-wrap"><span id="m">00</span></span><span id="ampm"> AM</span>
  </div>
  <div class="sub-header">
    <div id="date"></div>
    <span class="sub-header-dot">●</span>
    <div id="lebanon"></div>
  </div>
</header>

<div class="quote-container">
  <span id="quote-text">"Loading wisdom..."</span>
  <span id="quote-author"></span>
</div>

<div class="divider"></div>

<div class="main-layout">
  
  <!-- LEFT PANEL (Market) -->
  <div class="left-panel">
    <div class="widget-card glass-panel voo-widget">
      <div class="widget-header mb-8">
        <div class="flex-center">
          <span class="widget-title" id="market-title">Market Overview</span>
          <span id="market-status" class="market-status"></span>
        </div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="modal-overlay hidden">
  <div class="modal-content">
    <h2>Dashboard Settings</h2>
    
    <div class="form-group">
      <label for="set-city">Default Weather City</label>
      <input type="text" id="set-city" placeholder="e.g. Burbank, CA">
    </div>
    
    <div class="form-group">
      <label for="set-ticker">Stock Ticker</label>
      <input type="text" id="set-ticker" placeholder="e.g. BATS:VOO or NASDAQ:AAPL">
    </div>
    
    <div class="form-group">
      <label for="set-accent">Accent Color</label>
      <div class="flex-center-gap">
        <input type="color" id="set-accent" value="#FF9500" class="color-picker">
        <span style="font-size: 11px; color: var(--muted);">Pick your global theme color</span>
      </div>
    </div>
    
    <div class="modal-actions">
      <button id="settings-cancel" class="btn">Cancel</button>
      <button id="settings-save" class="btn primary">Save & Reload</button>
    </div>
  </div>
</div>

<script>
/* ==========================================
   1. CORE UTILITIES & CONFIG
========================================== */
const CONSTANTS = {
  WEATHER_CACHE_MS: 900000,
  GEO_TIMEOUT_MS: 2000,
  CLOCK_ANIM_MS: 150,
  SCRATCHPAD_DEBOUNCE_MS: 500,
  INDICATOR_DELAY_MS: 2000,
  COPY_FEEDBACK_MS: 1500,
  PASTE_ERROR_MS: 2500,
  TICK_MS: 1000
};

const StorageUtils = {
  get: k => { try { return localStorage.getItem(k); } catch(e) { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) { console.warn("Storage restricted"); } }
};

const Config = {
  data: {
    city: "Burbank, CA",
    lat: 34.1808,
    lon: -118.3090,
    ticker: "BATS:VOO",
    accent: "#FF9500"
  },
  init() {
    const saved = StorageUtils.get('salut_config');
    if (saved) {
      try { this.data = { ...this.data, ...JSON.parse(saved) }; } catch(e) {}
    }

    // Auto-upgrade AMEX (15m delayed) to BATS (real-time)
    if (this.data.ticker === "AMEX:VOO") {
      this.data.ticker = "BATS:VOO";
      this.save();
    }
  },
  save() { StorageUtils.set('salut_config', JSON.stringify(this.data)); }
};

/* ==========================================
   2. WIDGETS
========================================== */

/* ── SETTINGS MODAL ── */
const SettingsWidget = {
  modal: null, btnOpen: null, btnCancel: null, btnSave: null,
  inputCity: null, inputTicker: null, inputAccent: null,

  init() {
    this.modal = document.getElementById('settings-modal');
    this.btnOpen = document.getElementById('settings-open-btn');
    this.btnCancel = document.getElementById('settings-cancel');
    this.btnSave = document.getElementById('settings-save');
    this.inputCity = document.getElementById('set-city');
    this.inputTicker = document.getElementById('set-ticker');
    this.inputAccent = document.getElementById('set-accent');

    if(this.btnOpen) this.btnOpen.addEventListener('click', () => this.open());
    if(this.btnCancel) this.btnCancel.addEventListener('click', () => this.close());
    if(this.btnSave) this.btnSave.addEventListener('click', () => this.save());
  },
  open() {
    if(!this.modal) return;
    this.inputCity.value = Config.data.city;
    this.inputTicker.value = Config.data.ticker;
    this.inputAccent.value = Config.data.accent || "#FF9500";
    this.modal.classList.remove('hidden');
  },
  close() {
    if(this.modal) this.modal.classList.add('hidden');
  },
  async save() {
    const newCity = this.inputCity.value.trim() || "Burbank, CA";
    Config.data.ticker = this.inputTicker.value.trim() || "BATS:VOO";
    Config.data.accent = this.inputAccent.value;

    // Geocode new city if changed
    if (newCity !== Config.data.city) {
      if(this.btnSave) this.btnSave.textContent = "Locating...";
      try {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(newCity)}&count=1`);
        const geo = await res.json();
        if (geo.results && geo.results.length > 0) {
          Config.data.city = geo.results[0].name + (geo.results[0].admin1 ? `, ${geo.results[0].admin1}` : '');
          Config.data.lat = geo.results[0].latitude;
          Config.data.lon = geo.results[0].longitude;
          // Force weather refresh by clearing cache
          StorageUtils.set('weatherTime', 0); 
        } else {
          Config.data.city = newCity; // Fallback to whatever they typed, though weather might fetch old coords
        }
      } catch(e) { console.warn("Geocoding failed", e); }
    }

    Config.save();
    window.location.reload(); // Simplest way to cleanly re-initialize everything
  }
};

/* ── SEARCH ── */
const SearchWidget = {
  omnibar: null,
  init() {
    this.omnibar = document.getElementById('omnibar');
    if(this.omnibar) {
      
      // Setup Greeting Placeholder based on time
      const hour = new Date().getHours();
      let greeting = "Good evening";
      if (hour >= 5 && hour < 12) greeting = "Good morning";
      else if (hour >= 12 && hour < 18) greeting = "Good afternoon";
      this.omnibar.placeholder = `${greeting}! Type to search or calculate...`;
      
      this.omnibar.addEventListener('keydown', e => { if(e.key === "Escape") { this.omnibar.value = ""; this.omnibar.blur(); } });
      
      // Auto-capitalize the first letter seamlessly
      this.omnibar.addEventListener('input', (e) => {
        const val = this.omnibar.value;
        if (val.length === 1 && val !== val.toUpperCase() && e.inputType !== 'deleteContentBackward') {
          this.omnibar.value = val.toUpperCase();
        }
      });
    }
  },
  handle(e) {
    e.preventDefault();
    if(!this.omnibar) return;
    const val = this.omnibar.value.trim();
    if (!val) return;

    // Smart Command: Quick Math (e.g. "120 * 0.20")
    const mathRegex = /^[\d\s\+\-\*\/\(\)\.]+$/;
    if (mathRegex.test(val) && /[0-9]/.test(val) && /[\+\-\*\/]/.test(val)) {
      try {
        const result = new Function(`return (${val})`)();
        if (!isNaN(result) && isFinite(result)) {
          CalculatorWidget.currentVal = CalculatorWidget.stripErr(result).toString();
          CalculatorWidget.shouldResetScreen = true;
          CalculatorWidget.update();
          this.omnibar.value = '';
          this.omnibar.blur();
          return;
        }
      } catch (err) {
        // Fall back to regular search if parsing fails
      }
    }

    window.open("https://www.google.com/search?q=" + encodeURIComponent(val), "_blank", "noopener noreferrer");
    this.omnibar.value = '';
  }
};

/* ── CLOCK ── */
const ClockWidget = {
  dom: {},
  init() { 
    this.dom = {
      h: document.getElementById('h'), m: document.getElementById('m'),
      ampm: document.getElementById('ampm'), date: document.getElementById('date'),
      leb: document.getElementById('lebanon')
    };
    this.update(); 
  },
  update() {
    const now = new Date(), rawH = now.getHours(), h12 = rawH % 12 || 12;
    const hStr = h12.toString(), mStr = now.getMinutes().toString().padStart(2, '0');
    
    if(this.dom.h && this.dom.h.textContent !== hStr) {
      this.dom.h.classList.add('digit-changing');
      setTimeout(() => { this.dom.h.textContent = hStr; this.dom.h.classList.replace('digit-changing', 'digit-incoming'); }, CONSTANTS.CLOCK_ANIM_MS);
    }
    if(this.dom.m && this.dom.m.textContent !== mStr) {
      this.dom.m.classList.add('digit-changing');
      setTimeout(() => { this.dom.m.textContent = mStr; this.dom.m.classList.replace('digit-changing', 'digit-incoming'); }, CONSTANTS.CLOCK_ANIM_MS);
    }
    if(this.dom.ampm) this.dom.ampm.textContent = rawH >= 12 ? ' PM' : ' AM';
    
    const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    if(this.dom.date) this.dom.date.textContent = dateStr;
    
    const lbTime = new Intl.DateTimeFormat("en-US", { timeZone: "Asia/Beirut", hour: "numeric", minute: "2-digit" }).format(now);
    if(this.dom.leb) this.dom.leb.innerHTML = `Lebanon <span>${lbTime}</span>`;
    
    setTimeout(() => requestAnimationFrame(() => this.update()), 1000 - now.getMilliseconds());
  }
};

/* ── WEATHER ── */
const WeatherWidget = {
  MAP: {
    0: ["Clear", "☀️"], 1: ["Clear", "🌤️"], 2: ["Partly Cloudy", "⛅"], 3: ["Cloudy", "☁️"],
    45: ["Fog", "🌫️"], 61: ["Rain", "🌧️"], 95: ["Storm", "⛈️"]
  },
  dom: {},
  init() {
    // Cache DOM lookups for performance
    this.dom = {
      cityFront: document.getElementById('weather-city-front'),
      currTemp: document.getElementById('curr-temp'),
      currDesc: document.getElementById('curr-desc'),
      currIcon: document.getElementById('curr-icon'),
      currExtra: document.getElementById('curr-extra'),
      hourlyContainer: document.getElementById('hourly-forecast-container'),
      dailyContainer: document.getElementById('daily-forecast-container')
    };

    const lastFetch = StorageUtils.get('weatherTime');
    const cacheAge = lastFetch ? (Date.now() - parseInt(lastFetch)) : Infinity;
    
    if (cacheAge < CONSTANTS.WEATHER_CACHE_MS) {
      try { this.render(JSON.parse(StorageUtils.get('weatherData'))); } 
      catch (e) { this.fetch(Config.data.lat, Config.data.lon, Config.data.city, false); }
    } else {
      if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
          pos => this.fetch(pos.coords.latitude, pos.coords.longitude, "Local", false),
          err => this.fetch(Config.data.lat, Config.data.lon, Config.data.city, true),
          { timeout: CONSTANTS.GEO_TIMEOUT_MS, maximumAge: CONSTANTS.WEATHER_CACHE_MS }
        );
      } else {
        this.fetch(Config.data.lat, Config.data.lon, Config.data.city, true);
      }
    }
  },
  async fetch(lat, lon, cityName, isFallback) {
    try {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Los_Angeles';
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=${encodeURIComponent(tz)}&forecast_days=7`;
      
      const response = await fetch(url);
      if (!response.ok) throw new Error("HTTP " + response.status);
      const data = await response.json();
      
      data.cityName = cityName; 
      data.isFallback = isFallback;
      StorageUtils.set('weatherData', JSON.stringify(data));
      StorageUtils.set('weatherTime', Date.now());
      this.render(data);
    } catch(e) {
      console.warn("Weather fetch failed, utilizing mock data", e);
      this.renderMock(cityName);
    }
  },
  render(data) {
    if(!data || !data.current) return;
    const [currDesc, currIcon] = this.MAP[data.current.weather_code] || ["Cloudy", "☁️"];
    
    if(this.dom.cityFront) {
      this.dom.cityFront.classList.remove('skeleton');
      if (data.isFallback) {
        this.dom.cityFront.innerHTML = `<div class="location-fallback" title="Location access denied, showing default city."><svg><use href="#icon-location-off"/></svg> ${data.cityName || Config.data.city}</div>`;
      } else {
        this.dom.cityFront.textContent = data.cityName || Config.data.city;
      }
    }
    
    if(this.dom.currTemp) {
      this.dom.currTemp.classList.remove('skeleton');
      this.dom.currTemp.textContent = Math.round(data.current.temperature_2m) + "°";
    }
    
    if(this.dom.currDesc) {
      this.dom.currDesc.classList.remove('skeleton');
      this.dom.currDesc.textContent = currDesc;
    }
    
    if(this.dom.currIcon) this.dom.currIcon.textContent = currIcon;
    
    if(this.dom.currExtra && data.current.relative_humidity_2m !== undefined) {
      this.dom.currExtra.classList.remove('skeleton');
      this.dom.currExtra.textContent = `Humidity: ${data.current.relative_humidity_2m}% • Wind: ${Math.round(data.current.wind_speed_10m)} mph`;
    }

    // Hourly
    const h = new Date().getHours();
    if(this.dom.hourlyContainer && data.hourly) {
      let hourlyHTML = '';
      for(let i=1; i<=8; i++) {
        const idx = (h + i) % 24;
        const [_, ic] = this.MAP[data.hourly.weather_code[idx]] || ["", "☁️"];
        const t = new Date(); t.setHours(idx);
        hourlyHTML += `<div class="forecast-item"><span class="f-time">${t.getHours()%12||12}${t.getHours()>=12?'p':'a'}</span><span class="f-icon">${ic}</span><span class="f-temp">${Math.round(data.hourly.temperature_2m[idx])}°</span></div>`;
      }
      this.dom.hourlyContainer.innerHTML = hourlyHTML;
    }

    // Daily
    if(this.dom.dailyContainer && data.daily) {
      let dailyHTML = '';
      for(let i=1; i<=3; i++) {
        const dateObj = new Date(data.daily.time[i] + "T00:00:00");
        const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
        const [desc, icon] = this.MAP[data.daily.weather_code[i]] || ["", "☁️"];
        const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
        const minTemp = Math.round(data.daily.temperature_2m_min[i]);
        dailyHTML += `<div class="daily-item"><span class="d-day">${dayName}</span><span class="d-icon" title="${desc}">${icon}</span><span class="d-temp">${minTemp}° <span class="d-temp-max">${maxTemp}°</span></span></div>`;
      }
      this.dom.dailyContainer.innerHTML = dailyHTML;
    }
  },
  renderMock(cityName) {
    this.render({
      cityName: cityName === "Local" ? "Local (Offline)" : `${Config.data.city} (Offline)`,
      isFallback: true,
      current: { temperature_2m: 72, relative_humidity_2m: 45, wind_speed_10m: 5, weather_code: 0 },
      hourly: { temperature_2m: Array(24).fill(72).map((t,i) => t+Math.sin(i)*5), weather_code: Array(24).fill(0) },
      daily: {
        time: Array(7).fill(0).map((_, i) => { const d = new Date(); d.setDate(d.getDate() + i); return d.toISOString().split('T')[0]; }),
        temperature_2m_max: Array(7).fill(78), temperature_2m_min: Array(7).fill(62), weather_code: Array(7).fill(0)
      }
    });
  }
};

/* ── TRADINGVIEW ── */
const MarketWidget = {
  init() {
    const container = document.getElementById('tv-widget-container');
    const title = document.getElementById('market-title');
    if(!container) return;
    
    // Strip exchange prefix for a cleaner title (e.g., "BATS:VOO" -> "VOO")
    if(title) {
      title.textContent = Config.data.ticker.includes(':') ? Config.data.ticker.split(':')[1] : Config.data.ticker;
    }
    
    this.updateStatus();
    setInterval(() => this.updateStatus(), 60000);
    
    const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    const s = document.createElement('script');
    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
    s.async = true;
    s.innerHTML = JSON.stringify({
      "symbols": [["", `${Config.data.ticker}|1D`]],
      "chartOnly": false, "width": "100%", "height": "100%", 
      "colorTheme": isDark ? "dark" : "light", 
      "backgroundColor": isDark ? "#1c1c1c" : "#ffffff", 
      "fontFamily": "Plus Jakarta Sans, sans-serif", "fontSize": "11", "lineWidth": 2, "lineColor": "#FF9500", 
      "topColor": "rgba(255,149,0,0.05)", "bottomColor": "rgba(255,255,255,0)", 
      "hideDateRanges": false, "dateRanges": ["1d|1","5d|5","1m|30","6m|180"]
    });
    
    s.onload = () => container.classList.remove('skeleton', 'skeleton-block');
    container.innerHTML = '<div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div></div>';
    container.querySelector('.tradingview-widget-container').appendChild(s);
  },
  updateStatus() {
    const statusEl = document.getElementById('market-status');
    if(!statusEl) return;
    
    try {
      const now = new Date();
      const estString = now.toLocaleString("en-US", { timeZone: "America/New_York" });
      const estDate = new Date(estString);
      const day = estDate.getDay();
      const time = estDate.getHours() + (estDate.getMinutes() / 60);
      
      // Regular trading hours: Mon-Fri (1-5), 9:30 AM (9.5) to 4:00 PM (16.0)
      const isOpen = (day !== 0 && day !== 6 && time >= 9.5 && time < 16);
      
      statusEl.textContent = isOpen ? 'Open' : 'Closed';
      statusEl.className = 'market-status ' + (isOpen ? 'open' : 'closed');
    } catch(e) {
      statusEl.style.display = 'none';
    }
  }
};

/* ── CALCULATOR ── */
const CalculatorWidget = {
  displayEl: null,
  currentVal: '0',
  previousVal: '',
  operation: null,
  shouldResetScreen: false,

  init() {
    this.displayEl = document.getElementById('calc-display');
  },

  update() {
    if(!this.displayEl) return;
    let displayText = this.currentVal;
    if (this.operation !== null) {
      let opSymbol = this.operation;
      if (opSymbol === '*') opSymbol = '×';
      if (opSymbol === '/') opSymbol = '÷';
      displayText = this.shouldResetScreen 
        ? `${this.previousVal} ${opSymbol}` 
        : `${this.previousVal} ${opSymbol} ${this.currentVal}`;
    }
    this.displayEl.textContent = displayText;
    this.displayEl.scrollLeft = this.displayEl.scrollWidth; 
  },
  stripErr(num) { return parseFloat(num.toPrecision(12)); },
  num(n) {
    if (this.shouldResetScreen) {
      this.currentVal = n === '.' ? '0.' : n;
      this.shouldResetScreen = false;
    } else {
      if (this.currentVal === '0') this.currentVal = n === '.' ? '0.' : n;
      else {
        if (n === '.' && this.currentVal.includes('.')) return;
        this.currentVal += n;
      }
    }
    this.update();
  },
  op(o) {
    if (this.operation !== null) this.eq();
    this.previousVal = this.currentVal;
    this.operation = o;
    this.shouldResetScreen = true;
    this.update();
  },
  eq() {
    if (this.operation === null || this.shouldResetScreen) return;
    let result;
    const prev = parseFloat(this.previousVal), current = parseFloat(this.currentVal);
    switch (this.operation) {
      case '+': result = prev + current; break;
      case '-': result = prev - current; break;
      case '*': result = prev * current; break;
      case '/': result = current === 0 ? 'Error' : prev / current; break;
    }
    if (result !== 'Error') result = this.stripErr(result);
    this.currentVal = result.toString();
    this.operation = null;
    this.shouldResetScreen = true;
    this.update();
  },
  clear() {
    this.currentVal = '0';
    this.previousVal = '';
    this.operation = null;
    this.update();
  },
  async copy() {
    if (this.currentVal === 'Error') return;
    try {
      // Modern Clipboard API check
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(this.currentVal);
      } else {
        // Fallback for strict iframe permissions
        const tempInput = document.createElement("input");
        tempInput.value = this.currentVal;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
      }
      
      // Visual feedback
      if(this.displayEl) {
        this.displayEl.style.color = "var(--yellow)";
        setTimeout(() => { this.displayEl.style.color = ""; }, 300);
      }
    } catch(err) {
      console.warn("Clipboard restricted", err);
    }
  },
  async paste() {
    if(!this.displayEl) return;
    try {
      if (!navigator.clipboard || !navigator.clipboard.readText) throw new Error("Clipboard API not supported");
      const text = await navigator.clipboard.readText();
      const parsed = parseFloat(text.replace(/[^0-9.-]/g, ''));
      if (!isNaN(parsed)) {
        this.currentVal = this.stripErr(parsed).toString();
        this.shouldResetScreen = true;
        this.update();
      }
    } catch (err) {
      const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
      this.displayEl.textContent = `Press ${isMac ? 'Cmd+V' : 'Ctrl+V'}`;
      this.displayEl.style.fontSize = "22px";
      setTimeout(() => { this.displayEl.style.fontSize = ""; this.update(); }, CONSTANTS.PASTE_ERROR_MS);
    }
  }
};

/* ── SCRATCHPAD ── */
const ScratchpadWidget = {
  input: null,
  indicator: null,
  timeout: null,
  
  init() {
    this.input = document.getElementById('scratchpad-input');
    this.indicator = document.getElementById('save-indicator');

    if(!this.input) return;

    this.input.value = StorageUtils.get('salut_scratchpad') || '';

    this.input.addEventListener('input', (e) => {
      // Auto-capitalize first letter seamlessly
      const val = this.input.value;
      if (val.length === 1 && val !== val.toUpperCase() && e.inputType !== 'deleteContentBackward') {
        this.input.value = val.toUpperCase();
      }

      clearTimeout(this.timeout);
      if(this.indicator) this.indicator.classList.remove('visible');
      
      this.timeout = setTimeout(() => {
        StorageUtils.set('salut_scratchpad', this.input.value);
        if(this.indicator) {
          this.indicator.classList.add('visible');
          setTimeout(() => { if(this.indicator) this.indicator.classList.remove('visible'); }, CONSTANTS.INDICATOR_DELAY_MS);
        }
      }, CONSTANTS.SCRATCHPAD_DEBOUNCE_MS);
    });

    const clearBtn = document.getElementById('clear-btn');
    if(clearBtn) {
      clearBtn.addEventListener('click', () => {
        if(!this.input) return;
        this.input.value = ''; StorageUtils.set('salut_scratchpad', ''); this.input.focus();
      });
    }

    const copyBtn = document.getElementById('copy-btn');
    if(copyBtn) {
      copyBtn.addEventListener('click', async () => {
        if(!this.input) return;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(this.input.value);
          } else {
            this.input.select(); 
            document.execCommand('copy');
          }
          const orig = copyBtn.innerHTML;
          copyBtn.innerHTML = `<svg><use href="#icon-copy"></use></svg>`;
          setTimeout(() => { if(copyBtn) copyBtn.innerHTML = orig; }, CONSTANTS.COPY_FEEDBACK_MS);
        } catch(err) {
          console.warn("Clipboard restricted", err);
        }
      });
    }

    const pasteBtn = document.getElementById('paste-btn');
    if(pasteBtn) {
      pasteBtn.addEventListener('click', async () => {
        if(!this.input) return;
        try {
          if (!navigator.clipboard) throw new Error("Clipboard API not supported");
          this.input.value += (this.input.value ? '\n' : '') + await navigator.clipboard.readText();
          this.input.dispatchEvent(new Event('input')); 
        } catch (err) {
          const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
          const orig = this.input.placeholder;
          this.input.placeholder = `[Click here & press ${isMac ? 'Cmd+V' : 'Ctrl+V'}]`;
          this.input.focus();
          setTimeout(() => { if(this.input) this.input.placeholder = orig; }, 3000);
        }
      });
    }
  }
};

/* ── QUOTE ── */
const QuoteWidget = {
  quotes: [
    { t: "The happiness of your life depends upon the quality of your thoughts.", a: "Marcus Aurelius" },
    { t: "We suffer more often in imagination than in reality.", a: "Seneca" },
    { t: "He who has a why to live can bear almost any how.", a: "Friedrich Nietzsche" },
    { t: "The only constant in life is change.", a: "Heraclitus" },
    { t: "Nature does not hurry, yet everything is accomplished.", a: "Lao Tzu" },
    { t: "I think, therefore I am.", a: "René Descartes" },
    { t: "In the depth of winter, I finally learned that within me there lay an invincible summer.", a: "Albert Camus" },
    { t: "Knowing yourself is the beginning of all wisdom.", a: "Aristotle" },
    { t: "The only true wisdom is in knowing you know nothing.", a: "Socrates" },
    { t: "It does not matter how slowly you go as long as you do not stop.", a: "Confucius" }
  ],
  init() {
    const q = this.quotes[Math.floor(Math.random() * this.quotes.length)];
    const quoteText = document.getElementById('quote-text');
    const quoteAuthor = document.getElementById('quote-author');
    if(quoteText) quoteText.textContent = `"${q.t}"`;
    if(quoteAuthor) quoteAuthor.textContent = `— ${q.a}`;
  }
};

/* ── GLOBAL EVENTS ── */
document.addEventListener('keydown', e => {
  const isInput = document.activeElement && (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA");
  
  if (!isInput) {
    const key = e.key;
    const validCalcKeys = /^[0-9\.\+\-\*\/\=]$|^Enter$|^Backspace$|^Escape$|^c$|^C$/;
    
    // Process Calculator bindings if applicable
    if (validCalcKeys.test(key)) {
      if (/^[0-9]$/.test(key)) CalculatorWidget.num(key);
      else if (key === '.') CalculatorWidget.num('.');
      else if (key === '+' || key === '-' || key === '*' || key === '/') CalculatorWidget.op(key);
      else if (key === 'Enter' || key === '=') CalculatorWidget.eq();
      else if (key === 'Backspace' || key === 'Escape' || key.toLowerCase() === 'c') CalculatorWidget.clear();
      
      e.preventDefault();
      return;
    } 
    // Otherwise fallback to focusing the Search bar for fast queries
    else if (!e.metaKey && !e.ctrlKey && !e.altKey && key.length === 1 && SearchWidget.omnibar) {
      SearchWidget.omnibar.focus();
    }
  }
});

document.addEventListener('paste', e => {
  const isInput = document.activeElement && (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA");
  if (!isInput && e.clipboardData) {
    const text = e.clipboardData.getData('text');
    if (text) {
      const parsed = parseFloat(text.replace(/[^0-9.-]/g, ''));
      if (!isNaN(parsed)) {
        e.preventDefault();
        CalculatorWidget.currentVal = CalculatorWidget.stripErr(parsed).toString();
        CalculatorWidget.shouldResetScreen = true;
        CalculatorWidget.update();
      }
    }
  }
});

/* ── BOOTSTRAP APP ── */
function initializeApp() {
  Config.init();
  document.documentElement.style.setProperty('--yellow', Config.data.accent || "#FF9500");
  
  // Centralized Global Storage Listener
  window.addEventListener('storage', (e) => {
    if (e.key === 'salut_config') {
      window.location.reload();
    } else if (e.key === 'salut_scratchpad' && ScratchpadWidget.input && e.newValue !== ScratchpadWidget.input.value) {
      ScratchpadWidget.input.value = e.newValue || '';
    }
  });

  SettingsWidget.init();
  ClockWidget.init();
  SearchWidget.init();
  CalculatorWidget.init();
  ScratchpadWidget.init();
  QuoteWidget.init();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initializeApp);
} else {
  initializeApp();
}

// TV & Weather handle their own async loading to prevent blocking
if(window.requestIdleCallback) {
  requestIdleCallback(() => { MarketWidget.init(); WeatherWidget.init(); });
} else {
  window.addEventListener('load', () => { MarketWidget.init(); WeatherWidget.init(); });
}
</script>
