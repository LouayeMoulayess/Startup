<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f6f6f4">
<title>Salut!</title>

<!-- Preconnect to external origins for performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://icons.duckduckgo.com">
<link rel="preconnect" href="https://api.open-meteo.com">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23fba31b' stroke='%23e37812' stroke-width='2'/%3E%3Cellipse cx='20' cy='18' rx='8' ry='4' fill='%23fff' opacity='0.5' transform='rotate(-30 20 18)'/%3E%3Cg fill='%23db2416'%3E%3Cpolygon points='32,15 34,21 40,21 35,25 37,31 32,27 27,31 29,25 24,21 30,21'/%3E%3Cpolygon points='20,30 22,36 28,36 23,40 25,46 20,42 15,46 17,40 12,36 18,36'/%3E%3Cpolygon points='44,30 46,36 52,36 47,40 49,46 44,42 39,46 41,40 36,36 42,36'/%3E%3Cpolygon points='32,44 34,50 40,50 35,54 37,60 32,56 27,60 29,54 24,50 30,50'/%3E%3C/g%3E%3C/svg%3E">

<!-- Optimized Font Loading -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f6f6f4;
  --yellow: #d4a017;
  --text: #1a1a1a;
  --muted: #717171;
  --card: rgba(255, 255, 255, 0.8);
  --border: #e2e2e0;
  --font-main: 'Plus Jakarta Sans', sans-serif;
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
}

/* ── DARK MODE ── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #121212;
    --text: #e0e0e0;
    --muted: #888888;
    --card: rgba(28, 28, 28, 0.8);
    --border: #2e2e2e;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── ANIMATIONS ── */
@keyframes fadeUp { 
  from { opacity: 0; transform: translateY(12px); } 
  to { opacity: 1; transform: translateY(0); } 
}
@keyframes digitOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-14px); } }
@keyframes digitIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

.digit-changing { animation: digitOut 0.15s ease forwards; }
.digit-incoming { animation: digitIn  0.15s ease forwards; }

body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 24px 20px; 
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

header { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 10px; }

#clock {
  font-family: var(--font-main);
  font-weight: 800;
  font-size: clamp(64px, 11vw, 88px); 
  letter-spacing: -4px;
  line-height: 0.85; 
  display: flex;
  align-items: flex-end;
}

.digit-wrap { display: inline-block; overflow: hidden; }
.colon { margin: 0 1px 0.04em; color: var(--yellow); opacity: 0.5; vertical-align: 0.15em; }
#ampm { font-size: 0.25em; font-weight: 800; letter-spacing: 2px; color: var(--yellow); margin-left: 10px; opacity: 0.6; }

.sub-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 4px;
  animation: fadeUp 0.3s 0.1s ease both;
}

#date { font-weight: 700; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
#date .day-name { opacity: 0.5; margin-right: 6px; }

#lebanon { font-size: 10px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--yellow); margin-top: 4px; }
#lebanon span { color: var(--text); font-weight: 500; font-size: 14px; letter-spacing: 0; }

.divider {
  width: 100%;
  max-width: 1152px;
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

.main-layout {
  display: flex;
  gap: 24px;
  width: 100%;
  max-width: 1152px;
  margin: 0 auto;
  align-items: stretch; 
}

.container { 
  flex: 0 0 560px; 
  display: flex; 
  flex-direction: column; 
  gap: 24px; 
}

.omnibar-wrapper {
  display: flex;
  flex-direction: column;
  gap: 16px; 
  width: 100%;
}

form#search-form { width: 100%; }

#omnibar {
  width: 100%;
  padding: 22px 28px;
  background: var(--card);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-family: var(--font-main);
  font-weight: 800;
  font-size: 20px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, background-color 0.2s;
  animation: fadeUp 0.4s 0.15s ease both;
}

#omnibar:focus {
  border-color: var(--yellow);
}

#shortcuts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 12px;
}

.shortcut-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--card);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  transition: background-color 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s;
  cursor: pointer;
  animation: fadeUp 0.4s both;
}

.shortcut-item:hover {
  background: var(--bg);
  border-color: var(--border);
  color: var(--text);
  opacity: 0.3; 
}

.shortcut-item.clear-btn {
  background: var(--card);
  border-color: var(--yellow);
  color: var(--yellow); 
  font-weight: 800;
  justify-content: center;
}

.shortcut-item.clear-btn svg {
  stroke: var(--yellow);
  width: 18px;
  height: 18px;
}

.shortcut-item.dragging {
  opacity: 0.4;
  border-color: var(--yellow);
  background: var(--bg);
}

.shortcut-item img { width: 16px; height: 16px; opacity: 0.8; transition: opacity 0.2s; }
.shortcut-item:hover img { opacity: 1; }

.side-panel { 
  display: flex; 
  flex-direction: column; 
  gap: 24px; 
  flex: 1; 
}

.widget-card {
  background: var(--card);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  animation: fadeUp 0.4s 0.2s ease both;
  overflow: hidden;
}

/* Weather */
#weather-widget { 
  height: 180px; 
  padding: 7px 24px 33px 24px; 
  display: flex; 
  flex-direction: column; 
  flex-shrink: 0;
}
.weather-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.weather-city { font-family: var(--font-main); font-weight: 800; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
#weather-last-update { font-size: 8px; color: var(--muted); }
.weather-main { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
.weather-icon-large { font-size: 42px; line-height: 1; }
.weather-temp { font-size: 32px; font-weight: 800; line-height: 1; }
.weather-desc { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: capitalize; margin-top: 2px; }
.forecast-strip { display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 14px; margin-top: auto; }
.forecast-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
.f-time { font-size: 10px; font-weight: 700; color: var(--muted); }
.f-icon { font-size: 16px; margin: 4px 0; }
.f-temp { font-size: 12px; font-weight: 700; }

/* TradingView */
.voo-widget { 
  flex: 1; 
  min-height: 328px; 
  display: flex;
  flex-direction: column;
}
.tradingview-widget-container { flex: 1; width: 100%; }

/* Scratchpad */
.scratchpad-container {
  background: var(--card);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  animation: fadeUp 0.4s 0.25s ease both;
  display: flex;
  flex-direction: column;
  flex: 1; 
  min-height: 250px; 
}

.scratchpad-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-main);
  font-weight: 800;
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.scratchpad-actions { display: flex; align-items: center; gap: 12px; }
.save-indicator { font-size: 10px; font-weight: 700; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.save-indicator.visible { opacity: 0.7; }
.action-btn { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; display: flex; align-items: center; } 
.action-btn:hover { opacity: 1; color: var(--text); }
.action-btn svg { width: 15px; height: 15px; }

#scratchpad-input {
  flex: 1;
  border: none;
  resize: none;
  padding: 20px;
  background: transparent;
  color: var(--text);
  font-family: var(--font-main);
  font-size: 15px;
  line-height: 1.6;
  outline: none;
}

#scratchpad-input::-webkit-scrollbar { width: 4px; }
#scratchpad-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── QUOTE SECTION ── */
.quote-container {
  width: 100%;
  max-width: 1152px;
  margin: 4px auto 0;
  text-align: center;
  animation: fadeUp 0.6s 0.5s ease both;
}

#quote-text {
  font-size: 15px;
  font-style: italic;
  font-weight: 500;
  color: var(--muted);
  line-height: 1.6;
  max-width: 80%;
  margin: 0 auto;
}

#quote-author {
  font-family: var(--font-main);
  font-weight: 800;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--yellow);
  margin-top: 8px;
  display: block;
}

.bottom-divider { 
  margin-top: 30px; 
  margin-bottom: 4px; 
  opacity: 0.4; 
}

@media (max-width: 1100px) {
  .main-layout { flex-direction: column; align-items: center; }
  .container, .side-panel, .divider { max-width: 560px; width: 100%; }
  .scratchpad-container, .voo-widget { height: 320px; flex: none; }
}
</style>
</head>
<body>

<header>
  <div id="clock">
    <span class="digit-wrap"><span id="h">00</span></span><span class="colon">:</span><span class="digit-wrap"><span id="m">00</span></span><span id="ampm"> AM</span>
  </div>
  <div class="sub-header">
    <div id="date"></div>
    <div id="lebanon"></div>
  </div>
</header>

<div class="divider"></div>

<div class="main-layout">
  <div class="container">
    <div class="omnibar-wrapper">
      <form id="search-form" onsubmit="handleSearch(event)">
        <input type="text" id="omnibar" aria-label="Search" placeholder="Search or type..." autofocus autocomplete="off" spellcheck="false">
      </form>
      <div id="shortcuts-grid"></div>
    </div>
    
    <div class="scratchpad-container">
      <div class="scratchpad-header">
        <span>Scratchpad</span>
        <div class="scratchpad-actions">
          <span class="save-indicator" id="save-indicator">Saved</span>
          <span class="action-btn" id="paste-btn" title="Paste from clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          </span>
          <span class="action-btn" id="copy-btn" title="Copy to clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </span>
        </div>
      </div>
      <textarea id="scratchpad-input" placeholder="Jot down a thought..."></textarea>
    </div>
  </div>

  <div class="side-panel">
    <div class="widget-card" id="weather-widget">
      <div class="weather-header">
        <span class="weather-city">Location...</span>
        <span id="weather-last-update">Live</span>
      </div>
      <div class="weather-main">
        <div class="weather-icon-large" id="curr-icon">☀️</div>
        <div class="weather-info-block">
          <div class="weather-temp" id="curr-temp">--°</div>
          <div class="weather-desc" id="curr-desc">Loading...</div>
        </div>
      </div>
      <div class="forecast-strip" id="forecast-container"></div>
    </div>

    <div class="widget-card voo-widget" id="tv-widget-container"></div>
  </div>
</div>

<div class="divider bottom-divider"></div>

<div class="quote-container">
  <p id="quote-text">"Loading wisdom..."</p>
  <span id="quote-author"></span>
</div>

<script>
const storage = {
  get: k => localStorage.getItem(k),
  set: (k, v) => localStorage.setItem(k, v)
};

/* ── SEARCH HANDLER ── */
function handleSearch(e) {
  e.preventDefault();
  const val = document.getElementById('omnibar').value.trim();
  if(val) window.open("https://www.google.com/search?q=" + encodeURIComponent(val), "_blank", "noopener noreferrer");
}

/* ── WEATHER GEOLOCATION ── */
async function fetchWeather(lat, lon, cityName = "Local") {
  const CACHE_KEY = 'weatherData', TIME_KEY = 'weatherTime';
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=auto&forecast_days=1`);
    const d = await r.json();
    d.cityName = cityName; 
    storage.set(CACHE_KEY, JSON.stringify(d));
    storage.set(TIME_KEY, Date.now());
    renderWeather(d);
  } catch(e) {
    console.error("Weather fetch failed:", e);
  }
}

(function init() {
  const last = storage.get('weatherTime');
  const initWeather = () => {
    if (last && Date.now() - parseInt(last) < 900000) {
      renderWeather(JSON.parse(storage.get('weatherData')));
    } else {
      if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
          pos => fetchWeather(pos.coords.latitude, pos.coords.longitude, "Local"),
          err => fetchWeather(34.1808, -118.3090, "Burbank, CA"),
          { timeout: 2000, maximumAge: 900000 }
        );
      } else {
        fetchWeather(34.1808, -118.3090, "Burbank, CA");
      }
    }
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initWeather);
  else initWeather();
})();

/* ── DATA ── */
const FAVICON_BASE = "https://icons.duckduckgo.com/ip3/";
const sites = [
  { k:"y", n:"YouTube",   s:"https://www.youtube.com/results?search_query=", d:"youtube.com" },
  { k:"a", n:"Amazon",    s:"https://www.amazon.com/s?k=", d:"amazon.com" },
  { k:"i", n:"Google AI", s:"https://www.google.com/search?udm=50&q=", d:"google.com" },
  { k:"c", n:"ChatGPT",   s:"https://chatgpt.com/?q=", d:"chatgpt.com" },
  { k:"u", n:"YT Music",  s:"https://music.youtube.com/search?q=", d:"music.youtube.com" },
  { k:"r", n:"Rotten T",  s:"https://www.rottentomatoes.com/search?search=", d:"rottentomatoes.com" },
  { k:"d", n:"IMDb",      s:"https://www.imdb.com/find/?q=", d:"imdb.com" },
  { k:"f", n:"Facebook",  s:"https://www.facebook.com/search/top?q=", d:"facebook.com" },
  { k:"e", n:"eBay",      s:"https://www.ebay.com/sch/i.html?_nkw=", d:"ebay.com" },
  { k:"n", n:"Netflix",   s:"https://www.netflix.com/search?q=", d:"netflix.com" },
  { k:"m", n:"Max",       s:"https://www.max.com/search?q=", d:"max.com" },
  { k:"h", n:"Hulu",      s:"https://www.hulu.com/search?q=", d:"hulu.com" },
  { k:"p", n:"Disney+",   s:"https://www.disneyplus.com/search?q=", d:"disneyplus.com" },
  { k:"x", n:"Reddit",    s:"https://www.reddit.com/search/?q=", d:"reddit.com" },
  { k:"ig",n:"Instagram", s:"https://www.google.com/search?q=site:instagram.com+", d:"instagram.com" }
];

const quotes = [
  { t: "The happiness of your life depends upon the quality of your thoughts.", a: "Marcus Aurelius" },
  { t: "We suffer more often in imagination than in reality.", a: "Seneca" },
  { t: "He who has a why to live can bear almost any how.", a: "Friedrich Nietzsche" },
  { t: "The only constant in life is change.", a: "Heraclitus" },
  { t: "Nature does not hurry, yet everything is accomplished.", a: "Lao Tzu" },
  { t: "Je pense, donc je suis.", a: "René Descartes" },
  { t: "Au milieu de l'hiver, j'ai découvert en moi un invincible été.", a: "Albert Camus" }
];

/* ── CLOCK ── */
function updateClock() {
  const hEl = document.getElementById('h'), mEl = document.getElementById('m'), ampmEl = document.getElementById('ampm');
  const now = new Date(), rawH = now.getHours(), h12 = rawH % 12 || 12;
  const hStr = h12.toString(), mStr = now.getMinutes().toString().padStart(2, '0');
  
  if(hEl && hEl.textContent !== hStr) {
    hEl.classList.add('digit-changing');
    setTimeout(() => { hEl.textContent = hStr; hEl.classList.replace('digit-changing', 'digit-incoming'); }, 150);
  }
  if(mEl && mEl.textContent !== mStr) {
    mEl.classList.add('digit-changing');
    setTimeout(() => { mEl.textContent = mStr; mEl.classList.replace('digit-changing', 'digit-incoming'); }, 150);
  }
  if(ampmEl) ampmEl.textContent = rawH >= 12 ? ' PM' : ' AM';
  
  const day = now.getDate(), suffix = ["th","st","nd","rd"][(day % 10 > 3 || Math.floor(day % 100 / 10) === 1) ? 0 : day % 10];
  const dateEl = document.getElementById('date');
  if(dateEl) dateEl.innerHTML = `<span class="day-name">${now.toLocaleDateString('en-US', { weekday: 'long' })}</span> ${day}${suffix} of ${now.toLocaleDateString('en-US', { month: 'long' })}`;
  
  const lbTime = new Intl.DateTimeFormat("en-US", { timeZone: "Asia/Beirut", hour: "numeric", minute: "2-digit" }).format(now);
  const lebEl = document.getElementById('lebanon');
  if(lebEl) lebEl.innerHTML = `LEB &nbsp;·&nbsp; <span>${lbTime}</span>`;
  
  const delay = 1000 - now.getMilliseconds();
  setTimeout(() => requestAnimationFrame(updateClock), delay);
}
updateClock();

/* ── SHORTCUTS GENERATION ── */
const omnibar = document.getElementById('omnibar');
const grid = document.getElementById('shortcuts-grid');

const savedOrder = storage.get('salut_shortcuts_order');
if (savedOrder) {
  try {
    const orderArr = JSON.parse(savedOrder);
    sites.sort((a, b) => {
      const iA = orderArr.indexOf(a.k), iB = orderArr.indexOf(b.k);
      return (iA === -1 ? 99 : iA) - (iB === -1 ? 99 : iB);
    });
  } catch(e) {}
}

sites.forEach((site, index) => {
  const a = document.createElement('a');
  a.className = 'shortcut-item';
  a.draggable = true;
  a.dataset.key = site.k;
  a.title = site.n;
  a.style.animationDelay = `${0.2 + (index * 0.04)}s`;
  a.href = site.d.split('.').length > 2 ? `https://${site.d}` : `https://www.${site.d}`;
  a.target = "_blank";
  a.rel = "noopener noreferrer";
  
  a.onclick = e => {
    const val = omnibar.value.trim();
    if(val) {
      e.preventDefault();
      window.open(site.s + encodeURIComponent(val), "_blank", "noopener noreferrer");
    }
  };
  a.addEventListener('dragstart', () => a.classList.add('dragging'));
  a.addEventListener('dragend', () => a.classList.remove('dragging'));
  a.innerHTML = `<img src="${FAVICON_BASE}${site.d}.ico" loading="lazy" width="16" height="16" onerror="this.style.display='none'"><span>${site.n}</span>`;
  grid.appendChild(a);
});

const clearBtn = document.createElement('a');
clearBtn.className = 'shortcut-item clear-btn';
clearBtn.title = "Clear Search";
clearBtn.style.animationDelay = `${0.2 + (sites.length * 0.04)}s`;
clearBtn.href = "#";
clearBtn.onclick = e => { e.preventDefault(); omnibar.value = ""; omnibar.focus(); };
clearBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>`;
grid.appendChild(clearBtn);

/* ── DRAG & DROP ── */
grid.addEventListener('dragover', e => {
  e.preventDefault();
  const dragging = document.querySelector('.dragging');
  if(!dragging) return;
  const elements = [...grid.querySelectorAll('.shortcut-item:not(.dragging)')];
  const closest = elements.find(child => {
     const box = child.getBoundingClientRect();
     return e.clientX >= box.left && e.clientX <= box.right && e.clientY >= box.top && e.clientY <= box.bottom;
  });
  if(closest && closest.draggable) { 
     const box = closest.getBoundingClientRect();
     if(e.clientX < box.left + box.width / 2) grid.insertBefore(dragging, closest);
     else grid.insertBefore(dragging, closest.nextSibling);
  }
});
grid.addEventListener('drop', () => {
  grid.appendChild(clearBtn);
  const currentItems = [...grid.querySelectorAll('.shortcut-item[draggable="true"]')];
  storage.set('salut_shortcuts_order', JSON.stringify(currentItems.map(el => el.dataset.key)));
});

omnibar.onkeydown = e => { if(e.key === "Escape") { omnibar.value = ""; omnibar.blur(); } };
document.onkeydown = e => {
  const isInput = document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA";
  if(!isInput && !e.metaKey && !e.ctrlKey && !e.altKey && e.key.length === 1) omnibar.focus();
};

/* ── WEATHER RENDERER ── */
function renderWeather(data) {
  const map = code => ({
    0: ["Clear", "☀️"], 1: ["Clear", "🌤️"], 2: ["Partly Cloudy", "⛅"], 3: ["Cloudy", "☁️"],
    45: ["Fog", "🌫️"], 61: ["Rain", "🌧️"], 95: ["Storm", "⛈️"]
  }[code] || ["Cloudy", "☁️"]);
  const [currDesc, currIcon] = map(data.current.weather_code);
  document.querySelector('.weather-city').textContent = data.cityName || "Burbank, CA";
  document.getElementById('curr-temp').textContent = Math.round(data.current.temperature_2m) + "°";
  document.getElementById('curr-desc').textContent = currDesc;
  document.getElementById('curr-icon').textContent = currIcon;
  const container = document.getElementById('forecast-container'), h = new Date().getHours();
  if(!container) return;
  container.innerHTML = '';
  for(let i=1; i<=6; i++) {
    const idx = (h + i) % 24;
    const [d, ic] = map(data.hourly.weather_code[idx]);
    const t = new Date(); t.setHours(idx);
    const item = document.createElement('div');
    item.className = 'forecast-item';
    item.innerHTML = `<span class="f-time">${t.getHours()%12||12}${t.getHours()>=12?'p':'a'}</span><span class="f-icon">${ic}</span><span class="f-temp">${Math.round(data.hourly.temperature_2m[idx])}°</span>`;
    container.appendChild(item);
  }
}

/* ── TRADINGVIEW ── */
function initTV() {
  const container = document.getElementById('tv-widget-container');
  if(!container) return;
  const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  container.innerHTML = '<div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div></div>';
  const s = document.createElement('script');
  s.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
  s.async = true;
  s.innerHTML = JSON.stringify({
    "symbols": [["", "AMEX:VOO|1D"]],
    "chartOnly": false, "width": "100%", "height": "100%", 
    "colorTheme": isDark ? "dark" : "light", 
    "backgroundColor": isDark ? "#1c1c1c" : "#ffffff", 
    "fontFamily": "Plus Jakarta Sans, sans-serif", "fontSize": "11", "lineWidth": 2, "lineColor": "#d4a017", 
    "topColor": "rgba(212,160,23,0.05)", "bottomColor": "rgba(255,255,255,0)", 
    "hideDateRanges": false, "dateRanges": ["1d|1","5d|5","1m|30","6m|180"]
  });
  container.querySelector('.tradingview-widget-container').appendChild(s);
}
if(window.requestIdleCallback) requestIdleCallback(initTV);
else window.addEventListener('load', initTV);

/* ── SCRATCHPAD ── */
const pad = document.getElementById('scratchpad-input'), ind = document.getElementById('save-indicator');
const copyBtn = document.getElementById('copy-btn'), pasteBtn = document.getElementById('paste-btn');
let saveTimeout;

const showActionFeedback = (btn) => {
  const origIcon = btn.innerHTML;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#d4a017" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
  setTimeout(() => btn.innerHTML = origIcon, 1500);
};

if(pad) {
  pad.value = storage.get('salut_pad') || "";
  pad.oninput = () => {
    if(ind) {
      ind.classList.add('visible');
      clearTimeout(window.padT);
      window.padT = setTimeout(() => ind.classList.remove('visible'), 800);
    }
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => storage.set('salut_pad', pad.value), 500);
  };
}
if(copyBtn && pad) {
  copyBtn.onclick = () => {
    pad.select();
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    showActionFeedback(copyBtn);
  };
}
if(pasteBtn && pad) {
  pasteBtn.onclick = async () => {
    try {
      const text = await navigator.clipboard.readText();
      const start = pad.selectionStart, end = pad.selectionEnd;
      pad.value = pad.value.substring(0, start) + text + pad.value.substring(end);
      pad.selectionStart = pad.selectionEnd = start + text.length;
      pad.focus();
      pad.dispatchEvent(new Event('input')); 
      showActionFeedback(pasteBtn);
    } catch (err) {}
  };
}
function setRandomQuote() {
  const quote = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('quote-text').textContent = `"${quote.t}"`;
  document.getElementById('quote-author').textContent = quote.a;
}
setRandomQuote();
